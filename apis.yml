aid: akeyless
name: Akeyless
description: >-
  Akeyless is a cloud-native identity security platform that unifies secrets
  management, machine identity, and privileged access for AI agents, machines,
  and humans at scale. The platform provides a REST API with 200+ endpoints
  covering secrets vaulting, dynamic secrets generation, certificate lifecycle
  management, encryption and multi-cloud KMS, and SSH access governance. Built
  on patented Distributed Fragments Cryptography (DFC) technology, Akeyless
  delivers zero-knowledge, quantum-safe security without requiring central key
  storage. The API supports multiple authentication methods including AWS IAM,
  Azure AD, GCP, Kubernetes, SAML, OIDC, LDAP, and API key authentication.
